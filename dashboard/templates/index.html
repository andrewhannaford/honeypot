<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honeypot Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; color: #f0f6fc; }
    .badge {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: #3fb950;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.2rem;
    }
    .stat-card .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #f0f6fc; }
    .stat-card.highlight { border-color: #f85149; }
    .stat-card.highlight .value { color: #f85149; }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar select, .filter-bar input {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .filter-bar button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .filter-bar button:hover { background: #30363d; }
    .filter-bar .export-btn { background: #238636; border-color: #2ea043; color: white; margin-left: auto; }
    .filter-bar .export-btn:hover { background: #2ea043; }

    /* Grid layout */
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 1000px) { .three-col { grid-template-columns: 1fr; } }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #30363d;
      font-size: 0.85rem;
      font-weight: 600;
      color: #f0f6fc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-body { padding: 1rem; flex: 1; }

    /* Bar chart */
    .bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; font-size: 0.8rem; }
    .bar-label { width: 80px; text-align: right; color: #8b949e; flex-shrink: 0; }
    .bar-track { flex: 1; background: #21262d; border-radius: 4px; height: 16px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: #1f6feb; transition: width 0.4s; }
    .bar-fill.ssh { background: #388bfd; }
    .bar-fill.http { background: #3fb950; }
    .bar-fill.ftp { background: #d29922; }
    .bar-fill.telnet { background: #bc8cff; }
    .bar-fill.smtp { background: #f85149; }
    .bar-fill.redis { background: #ff7b72; }
    .bar-count { width: 40px; color: #8b949e; font-size: 0.75rem; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; padding: 0.4rem 0.6rem; color: #8b949e; font-weight: 600; border-bottom: 1px solid #21262d; }
    td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #21262d; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .ip { font-family: monospace; color: #79c0ff; }
    
    .service-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .service-badge.SSH    { background: #1f3a5f; color: #79c0ff; }
    .service-badge.HTTP   { background: #1a3726; color: #3fb950; }
    .service-badge.FTP    { background: #3d2e00; color: #d29922; }
    .service-badge.TELNET { background: #2d1f5e; color: #bc8cff; }
    .service-badge.SMTP   { background: #3c1616; color: #f85149; }
    .service-badge.REDIS  { background: #4c2323; color: #ff7b72; }

    .event-type { color: #8b949e; font-size: 0.75rem; }
    .event-type.credential { color: #f85149; font-weight: 600; }
    .event-type.download_attempt { color: #d29922; font-weight: 600; }
    .event-type.exec_attempt { color: #bc8cff; font-weight: 600; }

    /* Events feed */
    #events-feed { font-size: 0.78rem; max-height: 500px; overflow-y: auto; }
    .event-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid #21262d;
      align-items: flex-start;
    }
    .event-row:last-child { border-bottom: none; }
    .event-row .ts { color: #484f58; flex-shrink: 0; font-family: monospace; }
    .event-row .svc { flex-shrink: 0; }
    .event-row .msg { color: #c9d1d9; word-break: break-all; }
    .event-row.credential-event { background: #1c1010; }

    .refresh-info { font-size: 0.7rem; color: #484f58; }

    /* Geo live stream (SSE) */
    #attack-sse-feed { font-size: 0.78rem; max-height: 200px; overflow-y: auto; font-family: monospace; }
    #attack-sse-feed .sse-line { padding: 0.35rem 0; border-bottom: 1px solid #21262d; color: #8b949e; }
  </style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <h1>Honeypot Dashboard</h1>
  <span class="badge" id="last-updated">Loading...</span>
</header>

<main>

  <!-- Stat cards -->
  <div class="stat-grid" id="stat-cards">
    <div class="stat-card"><div class="label">Total Events</div><div class="value" id="stat-total">—</div></div>
    <div class="stat-card"><div class="label">SSH</div><div class="value" id="stat-ssh">—</div></div>
    <div class="stat-card"><div class="label">HTTP</div><div class="value" id="stat-http">—</div></div>
    <div class="stat-card"><div class="label">SMTP</div><div class="value" id="stat-smtp">—</div></div>
    <div class="stat-card"><div class="label">Redis</div><div class="value" id="stat-redis">—</div></div>
    <div class="stat-card highlight"><div class="label">Credentials</div><div class="value" id="stat-creds">—</div></div>
  </div>

  <div class="three-col">
    <!-- Activity by service -->
    <div class="panel">
      <div class="panel-header">Activity by Service</div>
      <div class="panel-body" id="service-bars"></div>
    </div>

    <!-- Top attacker IPs -->
    <div class="panel">
      <div class="panel-header">Top Attacker IPs</div>
      <div style="overflow-y:auto">
        <table>
          <thead><tr><th>#</th><th>IP Address</th><th>Events</th></tr></thead>
          <tbody id="top-ips"></tbody>
        </table>
      </div>
    </div>

    <!-- Top Countries -->
    <div class="panel">
      <div class="panel-header">Top Countries</div>
      <div style="overflow-y:auto">
        <table>
          <thead><tr><th>#</th><th>Country</th><th>Events</th></tr></thead>
          <tbody id="top-countries"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Filters and Export -->
  <div class="filter-bar">
    <select id="filter-service" onchange="loadEvents()">
      <option value="">All Services</option>
      <option value="SSH">SSH</option>
      <option value="HTTP">HTTP</option>
      <option value="FTP">FTP</option>
      <option value="TELNET">TELNET</option>
      <option value="SMTP">SMTP</option>
      <option value="REDIS">REDIS</option>
    </select>
    <select id="filter-type" onchange="loadEvents()">
      <option value="">All Event Types</option>
      <option value="connect">Connect</option>
      <option value="credential">Credential</option>
      <option value="exec_attempt">Exec Attempt</option>
      <option value="download_attempt">Download Attempt</option>
      <option value="email_attempt">Email Attempt</option>
      <option value="trap_hit">Trap Hit</option>
    </select>
    <input type="text" id="filter-search" placeholder="Search IP..." onkeyup="if(event.key==='Enter') loadEvents()">
    <button onclick="loadEvents()">Apply</button>
    <button class="export-btn" onclick="window.location.href='/api/events/export.csv'">Export CSV</button>
  </div>

  <!-- Live event feed -->
  <div class="panel" style="margin-bottom:2rem">
    <div class="panel-header">
      Event Feed
      <span class="refresh-info">auto-refreshes every 15s</span>
    </div>
    <div class="panel-body">
      <div id="events-feed"></div>
    </div>
  </div>

  <div class="two-col" style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-bottom:2rem">
      <!-- Credential dump -->
      <div class="panel">
        <div class="panel-header">Captured Credentials</div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Time (UTC)</th><th>IP</th><th>Service</th><th>User:Pass</th></tr></thead>
            <tbody id="creds-table"></tbody>
          </table>
        </div>
      </div>

      <!-- Geo-tagged attacks (SSE) -->
      <div class="panel">
        <div class="panel-header">Live Attack Stream</div>
        <div class="panel-body">
          <div id="attack-sse-feed"></div>
        </div>
      </div>
  </div>

</main>

<script>
  const SERVICE_COLORS = { SSH: 'ssh', HTTP: 'http', FTP: 'ftp', TELNET: 'telnet', SMTP: 'smtp', REDIS: 'redis' };

  function esc(str) {
    if (str == null) return '—';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmt(ts) {
    return ts ? ts.replace('T', ' ').substring(0, 19) : '';
  }

  function svcBadge(svc) {
    return `<span class="service-badge ${esc(svc)}">${esc(svc)}</span>`;
  }

  async function loadStats() {
    const res = await fetch('/api/stats');
    if (!res.ok) return;
    const data = await res.json();

    document.getElementById('stat-total').textContent = data.total;

    const svcMap = {};
    data.by_service.forEach(r => svcMap[r.service] = r.count);
    document.getElementById('stat-ssh').textContent    = svcMap['SSH']    || 0;
    document.getElementById('stat-http').textContent   = svcMap['HTTP']   || 0;
    document.getElementById('stat-smtp').textContent   = svcMap['SMTP']   || 0;
    document.getElementById('stat-redis').textContent  = svcMap['REDIS']  || 0;
    document.getElementById('stat-creds').textContent = data.credential_count;

    // Service bars
    const maxCount = Math.max(...data.by_service.map(r => r.count), 1);
    document.getElementById('service-bars').innerHTML = data.by_service.map(r => {
      const pct = Math.round((r.count / maxCount) * 100);
      const cls = SERVICE_COLORS[r.service] || '';
      return `<div class="bar-row">
        <div class="bar-label">${r.service}</div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="bar-count">${r.count}</div>
      </div>`;
    }).join('');

    // Top IPs
    document.getElementById('top-ips').innerHTML = data.top_ips.map((r, i) =>
      `<tr><td>${i + 1}</td><td class="ip">${r.ip}</td><td>${r.count}</td></tr>`
    ).join('');

    // Credentials table
    document.getElementById('creds-table').innerHTML = data.recent_credentials.map(r => {
      let parsed = {};
      try { parsed = JSON.parse(r.data || '{}'); } catch {}
      return `<tr>
        <td>${fmt(r.timestamp)}</td>
        <td class="ip">${esc(r.ip)}</td>
        <td>${svcBadge(r.service)}</td>
        <td style="font-family:monospace">${esc(parsed.username || '—')}:${esc(parsed.password || '—')}</td>
      </tr>`;
    }).join('');

    const geoRes = await fetch('/api/geo-stats');
    if (geoRes.ok) {
        const geoData = await geoRes.json();
        document.getElementById('top-countries').innerHTML = geoData.map((r, i) =>
            `<tr><td>${i + 1}</td><td>${esc(r.country)}</td><td>${r.count}</td></tr>`
        ).join('');
    }
  }

  async function loadEvents() {
    const svc = document.getElementById('filter-service').value;
    const etype = document.getElementById('filter-type').value;
    const search = document.getElementById('filter-search').value;
    
    let url = '/api/events?limit=100';
    if (svc) url += `&service=${encodeURIComponent(svc)}`;
    if (etype) url += `&event_type=${encodeURIComponent(etype)}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;

    const res = await fetch(url);
    if (!res.ok) return;
    const events = await res.json();

    document.getElementById('events-feed').innerHTML = events.map(e => {
      let extra = '';
      try {
        const d = JSON.parse(e.data || '{}');
        if (e.event_type === 'credential') {
            extra = ` · ${esc(d.username || '—')}:${esc(d.password || '—')}`;
        } else if (e.event_type === 'email_attempt') {
            extra = ` · From: ${esc(d.from)} · Sub: ${esc(d.subject)}`;
        } else if (e.event_type === 'exec_attempt' || e.event_type === 'download_attempt') {
            extra = ` · Cmd: ${esc(d.command)}`;
        } else if (e.event_type === 'request') {
            extra = ` · ${esc(d.method)} ${esc(d.path)}`;
        } else if (e.event_type === 'trap_hit') {
            extra = ` · Path: ${esc(d.path)}`;
        }
      } catch {}
      
      const isCred = e.event_type === 'credential';
      const etypeCls = e.event_type.replace('_', '-');
      
      return `<div class="event-row ${isCred ? 'credential-event' : ''}">
        <span class="ts">${fmt(e.timestamp)}</span>
        <span class="svc">${svcBadge(e.service)}</span>
        <span class="event-type ${etypeCls}">${esc(e.event_type)}</span>
        <span class="msg">${esc(e.ip)}${extra}</span>
      </div>`;
    }).join('');

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  }

  function refresh() {
    loadStats();
    loadEvents();
  }

  refresh();
  setInterval(refresh, 15000);

  (function sseAttackStream() {
    const feed = document.getElementById('attack-sse-feed');
    if (!feed || !window.EventSource) return;
    const maxLines = 80;
    try {
      const es = new EventSource('/api/attack-stream');
      es.onmessage = (ev) => {
        try {
          const o = JSON.parse(ev.data);
          const div = document.createElement('div');
          div.className = 'sse-line';
          div.innerHTML = `${esc(o.ip)} · ${esc(o.country || '—')} · ${esc(o.service)} ` +
            `<span style="color:#484f58">(${Number(o.src_lat).toFixed(2)},${Number(o.src_lon).toFixed(2)} → ${Number(o.dst_lat).toFixed(2)},${Number(o.dst_lon).toFixed(2)})</span>`;
          feed.prepend(div);
          while (feed.children.length > maxLines) feed.removeChild(feed.lastChild);
        } catch (e) { /* ignore bad frame */ }
      };
      es.onerror = () => { /* browser reconnects */ };
    } catch (e) { /* SSE unsupported */ }
  })();
</script>
</body>
</html>
